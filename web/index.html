<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vape Shop Mini App</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#121620',
                            card: '#1b2230',
                            accent: '#3b99fc',
                            text: '#ffffff',
                            muted: '#8a99ad'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Скрываем скроллбар для эстетики */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col bg-app-bg text-app-text select-none font-sans">

    <!-- Глобальный контейнер контента -->
    <div id="app-content" class="flex-1 overflow-y-auto pb-20">
        
        <!-- Вкладка: Каталог -->
        <div id="tab-catalog" class="tab-screen p-3 h-full">
            
            <!-- Категории и поиск -->
            <div class="mb-4 sticky top-0 bg-app-bg z-10 pt-2 pb-2">
                <div id="categories-container" class="flex gap-2 overflow-x-auto mb-3 px-1 scrollbar-hide text-sm"></div>
                
                <div class="flex gap-2 items-center">
                    <div class="relative flex-1">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-app-muted">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                        </svg>
                        <input type="text" id="catalog-search" oninput="handleSearch()" placeholder="Найти..." class="w-full bg-app-card text-app-text placeholder-app-muted rounded-xl pl-10 pr-4 py-2.5 outline-none focus:border-app-accent border border-transparent transition-colors text-sm">
                    </div>
                    
                    <!-- Кнопка Сортировка -->
                    <button class="bg-app-card p-2.5 rounded-xl text-app-text hover:text-app-accent transition-colors">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5" />
                        </svg>
                    </button>
                    <!-- Кнопка Фильтры -->
                    <button class="bg-app-card p-2.5 rounded-xl text-app-text hover:text-app-accent transition-colors">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Сетка товаров (рендерится динамически) -->
            <div id="products-grid" class="grid grid-cols-2 gap-3 pb-6">
                <!-- Карточки вставляются через JS -->
            </div>
        </div>

        <!-- Вкладка: Поиск -->
        <div id="tab-search" class="tab-screen hidden p-4 h-full">
            <h1 class="text-2xl font-bold mb-4">Поиск</h1>
            <input type="text" placeholder="Найти товар..." class="w-full bg-app-card text-app-text placeholder-app-muted rounded-xl px-4 py-3 outline-none border border-transparent focus:border-app-accent transition-colors">
        </div>

        <!-- Вкладка: Корзина -->
        <div id="tab-cart" class="tab-screen hidden p-4 h-full flex flex-col">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h1 class="text-2xl font-bold">Корзина</h1>
                <button onclick="openPromoModal()" class="bg-app-card px-3 py-1.5 rounded-full text-xs text-app-muted hover:text-white transition-colors border border-white/5">
                    Активировать промокод
                </button>
            </div>
            
            <!-- Если пусто -->
            <div id="cart-empty" class="text-center mt-10 hidden flex-1">
                <div class="text-app-muted mb-4">Нет товаров</div>
                <button onclick="switchTab('catalog')" class="bg-app-card border border-app-accent/30 text-app-accent px-6 py-2 rounded-xl font-medium">В каталог</button>
            </div>

            <!-- Список товаров -->
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-3 pb-4">
                <!-- Рендерится через JS -->
            </div>

            <!-- Чек / Итог -->
            <div id="cart-receipt" class="shrink-0 bg-app-card p-4 rounded-2xl shadow-lg mt-2 hidden border border-white/5">
                <div class="flex justify-between text-sm text-app-muted mb-1">
                    <span>Товары:</span>
                    <span id="cart-subtotal">0 Br</span>
                </div>
                <div id="cart-discount-row" class="flex justify-between text-sm text-green-400 mb-2 hidden">
                    <span id="cart-discount-label">Скидка:</span>
                    <span id="cart-discount-val">-0 Br</span>
                </div>
                <div class="flex justify-between text-lg font-bold mb-4 pt-2 border-t border-white/10">
                    <span>Итог:</span>
                    <span id="cart-total" class="text-app-accent">0 Br</span>
                </div>
                <button onclick="checkout()" id="checkout-btn" class="w-full bg-app-accent hover:bg-blue-500 active:scale-[0.98] transition-all text-white py-3.5 rounded-xl font-bold shadow-[0_4px_15px_rgba(59,153,252,0.4)]">
                    Оформить заказ
                </button>
            </div>
        </div>

        <!-- Вкладка: Избранное -->
        <div id="tab-favorites" class="tab-screen hidden p-4 h-full">
            <h1 class="text-2xl font-bold mb-4">Избранное</h1>
            <div class="text-center text-app-muted mt-10">Нет избранных товаров</div>
        </div>

        <!-- Вкладка: Профиль -->
        <div id="tab-profile" class="tab-screen hidden p-4 h-full">
            <div class="bg-app-card rounded-2xl p-4 flex items-center space-x-4 mb-5 border border-white/5 mt-2">
                <div class="w-14 h-14 rounded-full bg-app-bg border-2 border-app-accent flex items-center justify-center text-app-accent overflow-hidden">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
                </div>
                <div>
                    <div id="profile-name" class="font-bold text-lg">Загрузка...</div>
                    <div id="profile-username" class="text-sm text-app-muted">...</div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-app-card border border-white/5 rounded-2xl p-3 text-center"><div class="text-[10px] text-app-muted uppercase font-semibold mb-1">Баланс</div><div class="font-bold text-app-accent" id="profile-balance">0 Br</div></div>
                <div class="bg-app-card border border-white/5 rounded-2xl p-3 text-center"><div class="text-[10px] text-app-muted uppercase font-semibold mb-1">Бонусы</div><div class="font-bold text-yellow-400" id="profile-bonuses">0 pts</div></div>
                <div class="bg-app-card border border-white/5 rounded-2xl p-3 text-center"><div class="text-[10px] text-app-muted uppercase font-semibold mb-1">Скидка</div><div class="font-bold text-green-400" id="profile-discount">0%</div></div>
            </div>

            <div class="space-y-2">
                <button onclick="fetchOrders()" class="w-full bg-app-card p-4 rounded-xl text-left font-medium active:bg-app-bg transition-colors flex justify-between items-center border border-white/5">Мои заказы <svg class="w-4 h-4 text-app-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                <button class="w-full bg-app-card p-4 rounded-xl text-left font-medium active:bg-app-bg transition-colors flex justify-between items-center border border-white/5">Депозиты <svg class="w-4 h-4 text-app-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                <button class="w-full bg-app-card p-4 rounded-xl text-left font-medium active:bg-app-bg transition-colors flex justify-between items-center border border-white/5">Бонусы <svg class="w-4 h-4 text-app-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                <button onclick="openDepositModal()" class="w-full bg-app-card p-4 rounded-xl text-left font-medium active:bg-app-bg transition-colors flex justify-between items-center border border-white/5 text-app-accent">Пополнить счет <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg></button>
                <button class="w-full bg-app-card p-4 rounded-xl text-left font-medium active:bg-app-bg transition-colors flex justify-between items-center border border-white/5 mt-4">Поддержка <svg class="w-4 h-4 text-app-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></button>
            </div>
        </div>

    </div>

    <!-- Экран: Страница товара (поверхностный) -->
    <div id="tab-product-details" class="fixed inset-0 bg-app-bg z-50 flex flex-col hidden transition-opacity">
        
        <div class="flex-1 overflow-y-auto pb-[90px]">
            <!-- Кнопка назад -->
            <button onclick="closeProductDetails()" class="absolute top-4 left-4 z-10 bg-black/40 backdrop-blur-md p-2 rounded-xl text-white border border-white/10">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
            </button>
            
            <!-- Область фото -->
            <div class="w-full h-80 bg-[#e6e8eb] flex items-center justify-center p-6 relative">
                <img id="detail-img" src="" class="max-h-full object-contain mix-blend-multiply drop-shadow-xl" alt="Product Image">
            </div>
            
            <!-- Информация -->
            <div class="p-4">
                <h1 id="detail-title" class="text-xl font-bold mb-4 leading-tight"></h1>
                
                <h3 id="detail-variants-title" class="text-xs font-semibold text-app-muted uppercase tracking-wider mb-3 hidden">Комплектация / Цвет</h3>
                <div class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4 scrollbar-hide" id="detail-variants">
                    <!-- Варианты вставляются через JS -->
                </div>
                
                <h3 class="text-xs font-semibold text-app-muted uppercase tracking-wider mt-6 mb-3">Описание</h3>
                <p id="detail-desc" class="text-sm text-gray-300 leading-relaxed"></p>
            </div>
        </div>
        
        <!-- Нижняя панель товара -->
        <div class="absolute bottom-0 left-0 w-full h-[80px] bg-app-card flex justify-between items-center px-4 gap-3 rounded-t-[24px] shadow-[0_-10px_40px_rgba(0,0,0,0.4)] z-50">
            <button onclick="switchTab('cart'); closeProductDetails()" class="w-[50px] h-[50px] flex-shrink-0 bg-app-bg rounded-2xl flex items-center justify-center text-app-text relative border border-white/5"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" /></svg><span id="detail-badge-cart" class="hidden absolute -top-1 -right-1 bg-app-accent text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-app-card">0</span></button>
            <button class="w-[50px] h-[50px] flex-shrink-0 bg-app-bg rounded-2xl flex items-center justify-center text-app-text border border-white/5"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg></button>
            <button id="detail-add-btn" class="flex-1 h-[50px] bg-app-accent hover:bg-blue-500 active:scale-[0.98] transition-all text-white rounded-2xl font-bold flex items-center justify-center text-[15px] shadow-[0_4px_15px_rgba(59,153,252,0.4)]">В корзину / 0 Br</button>
        </div>
    </div>

    <!-- Нижняя панель навигации (Bottom Navbar) -->
    <nav class="fixed bottom-0 left-0 w-full h-[68px] bg-app-card flex justify-between items-center px-4 rounded-t-[20px] shadow-[0_-4px_20px_rgba(0,0,0,0.3)] z-50">
        
        <button onclick="switchTab('catalog')" id="nav-catalog" class="nav-btn flex flex-col items-center justify-center w-12 text-app-accent transition-colors">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 mb-1"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>
            <span class="text-[10px] font-medium">Каталог</span>
        </button>

        <button onclick="switchTab('search')" id="nav-search" class="nav-btn flex flex-col items-center justify-center w-12 text-app-muted transition-colors">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 mb-1"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
            <span class="text-[10px] font-medium">Найти</span>
        </button>

        <button onclick="switchTab('cart')" id="nav-cart" class="nav-btn flex flex-col items-center justify-center w-12 text-app-muted transition-colors">
            <div class="relative">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 mb-1"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" /></svg>
                <!-- Бейдж корзины (скрыт по умолчанию) -->
                <span id="badge-cart" class="hidden absolute -top-1.5 -right-2 bg-app-accent text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-app-card">0</span>
            </div>
            <span class="text-[10px] font-medium">Корзина</span>
        </button>

        <button onclick="switchTab('favorites')" id="nav-favorites" class="nav-btn flex flex-col items-center justify-center w-12 text-app-muted transition-colors">
            <div class="relative">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 mb-1"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>
                <!-- Бейдж избранного -->
                <span id="badge-favorites" class="hidden absolute -top-1.5 -right-2 bg-app-accent text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-app-card">0</span>
            </div>
            <span class="text-[10px] font-medium">Избранное</span>
        </button>

        <button onclick="switchTab('profile')" id="nav-profile" class="nav-btn flex flex-col items-center justify-center w-12 text-app-muted transition-colors">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 mb-1"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
            <span class="text-[10px] font-medium">Профиль</span>
        </button>

    </nav>

    <!-- Модальное окно: Промокод -->
    <div id="promo-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-app-card w-full max-w-sm rounded-2xl p-5 border border-white/10 shadow-2xl transform scale-95 transition-transform" id="promo-modal-content">
            <h3 class="text-lg font-bold mb-4">Промокод</h3>
            <input type="text" id="promo-input" placeholder="Введите код" class="w-full bg-app-bg text-white px-4 py-3.5 rounded-xl mb-4 outline-none border border-white/10 focus:border-app-accent uppercase placeholder-app-muted">
            <p id="promo-error" class="text-red-400 text-xs mb-4 hidden"></p>
            <p id="promo-success" class="text-green-400 text-xs mb-4 hidden"></p>
            <div class="flex gap-3">
                <button onclick="closePromoModal()" class="flex-1 bg-white/5 hover:bg-white/10 py-3 rounded-xl font-medium transition-colors">Отмена</button>
                <button onclick="applyPromo()" class="flex-1 bg-app-accent hover:bg-blue-500 py-3 rounded-xl font-medium transition-colors shadow-lg">Применить</button>
            </div>
        </div>
    </div>

    <!-- Экран: История заказов -->
    <div id="orders-history-screen" class="fixed inset-0 bg-app-bg z-50 flex flex-col hidden transition-opacity">
        <div class="flex-1 overflow-y-auto pb-[90px] p-4">
            <div class="flex items-center mb-6 mt-2">
                <button onclick="closeOrdersHistory()" class="bg-app-card p-2 rounded-xl text-white border border-white/5 mr-4 hover:bg-white/5 transition-colors">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
                </button>
                <h2 class="text-2xl font-bold">Мои заказы</h2>
            </div>
            <div id="orders-list" class="space-y-4">
                <!-- Заказы рендерятся тут -->
            </div>
        </div>
    </div>

    <!-- Модальное окно: Пополнение счета -->
    <div id="deposit-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-app-card w-full max-w-sm rounded-2xl p-5 border border-white/10 shadow-2xl transform scale-95 transition-transform" id="deposit-modal-content">
            <h3 class="text-lg font-bold mb-4">Пополнение счета</h3>
            <input type="number" id="deposit-input" placeholder="Введите сумму (Br)" class="w-full bg-app-bg text-white px-4 py-3.5 rounded-xl mb-4 outline-none border border-white/10 focus:border-app-accent placeholder-app-muted">
            <div class="flex gap-3">
                <button onclick="closeDepositModal()" class="flex-1 bg-white/5 hover:bg-white/10 py-3 rounded-xl font-medium transition-colors">Отмена</button>
                <button onclick="submitDeposit()" class="flex-1 bg-app-accent hover:bg-blue-500 py-3 rounded-xl font-medium transition-colors shadow-lg">Пополнить</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
